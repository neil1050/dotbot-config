- defaults:
    link:
      create: true
- clean:
    ~/.config:
      recursive: true
- link:
    ~/.config/nvim/init.lua:
      path: nvim/init.lua
    ~/.config/nvim/lua:
      path: nvim/lua
    # starship config
    ~/.config/starship.toml:
      path: starship/starship.toml
    # git config
    ~/.config/git/config:
      path: git/.gitconfig
